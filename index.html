<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0E1111" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" /> 
    <title>ExpenseTracker Pro</title>

    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Noto+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Material Symbols -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: {
                DEFAULT: "#2ECC71",
                hover: "#34D399",
                dim: "#22C55E",
                "dark-dim": "#16A34A",
              },
              background: {
                light: "#F9FAFB",
                dark: "#0E1111",
              },
              surface: {
                light: "#FFFFFF",
                lighter: "#FFFFFF",
                dark: "#151A1A",
                darker: "#0B0F0F",
              },
              border: {
                light: "#E5E7EB",
                dark: "rgba(255,255,255,0.06)",
              },
              text: {
                light: {
                  main: "#111827",
                  muted: "#4B5563",
                  subtle: "#9CA3AF",
                },
                dark: {
                  main: "#E5E7EB",
                  muted: "#9CA3AF",
                  subtle: "#6B7280",
                },
              },
              success: { DEFAULT: "#22C55E", dark: "#4ADE80" },
              warning: { DEFAULT: "#F59E0B", dark: "#FBBF24" },
              danger: { DEFAULT: "#EF4444", dark: "#F87171" },
              info: { DEFAULT: "#3B82F6", dark: "#60A5FA" },
            },
            fontFamily: {
              display: ["Manrope", "sans-serif"],
              body: ["Noto Sans", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "1rem",
              lg: "1.5rem",
              xl: "2rem",
              "2xl": "3rem",
            },
            boxShadow: {
              card: "0 12px 30px rgba(0,0,0,0.3)",
              "card-light":
                "0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03)",
              soft: "0 8px 20px rgba(0,0,0,0.2)",
              glow: "0 0 24px rgba(46,204,113,0.15)",
            },
            keyframes: {
              float: {
                "0%, 100%": { transform: "translateY(0)" },
                "50%": { transform: "translateY(-10px)" },
              },
              slideUp: {
                from: { opacity: 0, transform: "translateY(20px)" },
                to: { opacity: 1, transform: "translateY(0)" },
              },
              fadeIn: {
                from: { opacity: 0 },
                to: { opacity: 1 },
              },
            },
            animation: {
              float: "float 6s ease-in-out infinite",
              "slide-up": "slideUp 0.6s ease-out forwards",
              "fade-in": "fadeIn 0.4s ease-out forwards",
            },
          },
        },
      };
    </script>

    <style>
/* ===== Notion-style auto-hide scrollbar ===== */

::-webkit-scrollbar {
  width: 4px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: #4f4f4f;
  border-radius: 999px;
  opacity: 0;
  transition: opacity 0.25s ease;
}

/* Show scrollbar when scrolling */
body.scrolling ::-webkit-scrollbar-thumb {
  opacity: 1;
}

/* Firefox */
body {
  scrollbar-width: thin;
  scrollbar-color: transparent transparent;
}

body.scrolling {
  scrollbar-color: #4f4f4f transparent;
}
    </style>
  </head>

  <body class="bg-background-light dark:bg-background-dark text-text-light-main dark:text-text-dark-main font-display antialiased">
    <div id="root"></div>

    <!-- Vite entry -->
    <script type="module" src="/index.tsx"></script>
    <script>
      let scrollTimeout;

      window.addEventListener("scroll", () => {
        document.body.classList.add("scrolling");
        clearTimeout(scrollTimeout);

        scrollTimeout = setTimeout(() => {
          document.body.classList.remove("scrolling");
        }, 250);
      });
    </script>
  </body>
</html>
